<svg width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="growthGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DB2777;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BE185D;stop-opacity:1" />
    </linearGradient>
    <filter id="growthGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#growthGrad)"/>
  <circle cx="120" cy="110" r="95" fill="rgba(255,255,255,0.1)" filter="url(#growthGlow)"/>
  <circle cx="1080" cy="500" r="135" fill="rgba(255,255,255,0.08)" filter="url(#growthGlow)"/>
  <circle cx="600" cy="300" r="72" fill="rgba(255,255,255,0.06)" filter="url(#growthGlow)"/>
  <text x="600" y="270" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="white" letter-spacing="1">PREDICTABLE,</text>
  <text x="600" y="350" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="white" letter-spacing="1">SUSTAINABLE GROWTH</text>
  <text x="600" y="450" font-family="Inter, Arial, sans-serif" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.9)">Strong foundations. Strategic alignment. Sustainable pace.</text>
</svg>